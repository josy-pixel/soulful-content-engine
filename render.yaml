services:
  - type: web
    name: soulful-content-engine
    runtime: python
    plan: starter
    region: oregon
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 1 --timeout 120
    healthCheckPath: /
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: DB_PATH
        value: /data/soulful_content.db
    disk:
      name: data
      mountPath: /data
      sizeGB: 1
