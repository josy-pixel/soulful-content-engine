services:
  - type: web
    name: soulful-content-engine
    runtime: python
    plan: free                  # upgrade to "starter" to enable the persistent disk below
    region: oregon
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 1 --timeout 120
    healthCheckPath: /
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false             # you paste this manually in the Render dashboard
      - key: SECRET_KEY
        generateValue: true     # Render auto-generates a secure random value
      - key: DB_PATH
        value: /data/soulful_content.db

# Persistent disk — requires "starter" plan ($7/mo) or above.
# Remove this block if you are staying on the free plan
# (data will reset on every redeploy on the free tier).
#  disk:
#    name: data
#    mountPath: /data
#    sizeGB: 1
